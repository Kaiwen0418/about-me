    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #090909;
        color: #f4f4f4;
      }

      #startup-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #090909;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        transition: opacity 0.25s ease;
      }

      #startup-loader.startup-loader-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .startup-loader-version {
        position: absolute;
        top: 2rem;
        left: 2rem;
        color: #444;
        font-family: "Space Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .startup-loader-box {
        width: min(400px, calc(100vw - 2.5rem));
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .startup-loader-grid {
        width: 64px;
        height: 64px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
        gap: 2px;
      }

      .startup-loader-pixel {
        background: transparent;
        animation: startup-pixel 0.9s steps(1, end) infinite;
      }

      .startup-loader-pixel[data-on="true"] {
        background: #f4f4f4;
      }

      .startup-loader-lines {
        height: 120px;
        overflow: hidden;
        color: #444;
        font-family: "Space Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        line-height: 1.6;
      }

      .startup-loader-lines span {
        display: block;
      }

      .startup-loader-progress {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .startup-loader-bar {
        position: relative;
        width: 100%;
        height: 2px;
        background: rgba(244, 244, 244, 0.15);
        overflow: hidden;
      }

      .startup-loader-bar::after {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 45%;
        background: #f4f4f4;
        animation: startup-bar 0.9s ease-in-out infinite alternate;
      }

      .startup-loader-status {
        display: flex;
        justify-content: space-between;
        color: #444;
        font-family: "Space Mono", monospace;
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @keyframes startup-pixel {
        0%,
        100% {
          opacity: 0.25;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes startup-bar {
        from {
          width: 32%;
        }
        to {
          width: 78%;
        }
      }
    </style>
  </head>
